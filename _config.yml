# Site settings
title: BATTLE
description: Deep learning for enhanced phage therapy
# Use blank baseurl for custom-domain deployment (phagebattle.com).
# If deploying under github.io/TeamBattle-Site instead, set baseurl to "/TeamBattle-Site".
baseurl: ""
url: "https://phagebattle.com"

email: teambattle.gems@gmail.com

# Build settings
markdown: kramdown
permalink: pretty

# Collections
collections:
  team:
    output: false

# Exclude from processing
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor

# Defaults
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"